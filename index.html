<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U8 Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    padding:15px;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

video{
    width:100%;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>M3U8 Player</h2>

<input
id="m3u8Link"
type="text"
placeholder="Paste M3U8 link here">

<button onclick="playVideo()">
Play Video
</button>

<video
id="video"
controls
playsinline>
</video>

<script>

let hls=null;

function playVideo(){

const video=document.getElementById("video");
const url=document.getElementById("m3u8Link").value.trim();

if(!url){
alert("Paste M3U8 link");
return;
}

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true
});

hls.loadSource(url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

hls.on(Hls.Events.ERROR,function(event,data){

console.log(data);

alert(
"Stream Error:\n"+
data.details
);

});

}

else if(video.canPlayType(
'application/vnd.apple.mpegurl'
)){

video.src=url;

video.play();

}

else{

alert(
"Browser does not support HLS"
);

}

}

</script>

</body>
</html>
