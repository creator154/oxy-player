<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U8 Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<h2>M3U8 Player</h2>

<input type="text" id="m3u8Link"
placeholder="Paste M3U8 link here"
style="width:100%;padding:10px;">

<br><br>

<button onclick="playVideo()">Play</button>

<br><br>

<video id="video" controls width="100%"></video>

<script>
function playVideo() {
    const video = document.getElementById("video");
    const videoSrc = document.getElementById("m3u8Link").value;

    if (!videoSrc) {
        alert("Paste link first");
        return;
    }

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
    } else {
        video.src = videoSrc;
    }
}
</script>

</body>
</html>
